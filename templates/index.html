<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>数据清洗工具 V2.3.0</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <div class="page">
        <header class="hero">
            <div class="hero-main">
                <div class="hero-title">数据清洗工具</div>
                <div class="hero-subtitle">上传数据 → 自动清洗 → 回填模板 → 下载结果</div>
                <div class="hero-author">by zhi</div>
            </div>
            <div class="hero-version">V2.3.0</div>
        </header>
        <section class="card input-card">
        <section class="card">
            <div class="section-head">
                <div>
                    <div class="section-title">输入区</div>
                    <div class="section-desc">上传原表、模板并设置产品参数</div>
                </div>
            </div>

            <div class="upload-grid">
                <div class="block">
                    <div class="block-label">微服务原表</div>
                    <div class="file-box">
                        <input type="file" id="data_file" class="file-input" />
                        <label for="data_file" class="file-btn">选择文件</label>
                        <span id="data_file_name" class="file-name">未选择文件</span>
                    </div>
                    <div class="block-desc">上传 SalesReport 原始导出文件</div>
                </div>

                <div class="block">
                    <div class="block-label">模板文件</div>
                    <div class="file-box">
                        <input type="file" id="template_file" class="file-input" />
                        <label for="template_file" class="file-btn">选择文件</label>
                        <span id="template_file_name" class="file-name">未选择文件</span>
                    </div>
                    <div class="block-desc">用于回填客户与门店数据</div>
                </div>
            </div>

            <div class="product-grid">
                <div class="block">
                    <div class="block-label">产品1</div>
                    <input type="text" id="product1" class="text-input" placeholder="必填" />
                </div>
                <div class="block">
                    <div class="block-label">产品2</div>
                    <input type="text" id="product2" class="text-input" />
                </div>
                <div class="block">
                    <div class="block-label">产品3</div>
                    <input type="text" id="product3" class="text-input" />
                </div>
                <div class="block">
                    <div class="block-label">产品4</div>
                    <input type="text" id="product4" class="text-input" />
                </div>
            </div>

            <div class="action-row">
                <button id="runBtn" class="primary-btn">开始生成</button>
            </div>
        </section>

        <section class="card">
            <div class="section-title">状态</div>
            <div id="status" class="status waiting">当前状态：等待操作</div>
        </section>

        <section class="card">
            <div class="section-title">概况</div>
            <div id="summary" class="summary-grid">
                <div class="summary-empty">暂无数据</div>
            </div>
        </section>

        <section class="card">
            <div class="section-title">客户</div>
            <div id="customer_preview" class="table-placeholder">暂无数据</div>
        </section>

        <section class="card">
            <div class="section-title">门店</div>
            <div id="store_preview" class="table-placeholder">暂无数据</div>
        </section>

        <section class="card">
            <div class="section-title">下载区</div>
            <div id="downloads" class="download-row">
                <span class="download-empty">暂无结果</span>
            </div>
        </section>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
